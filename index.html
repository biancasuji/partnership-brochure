<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그린컴퓨터아카데미 파트너십 브로셔</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        input::placeholder, textarea::placeholder { color: #cbd5e1; }
        .break-keep { word-break: keep-all; }
        .custom-shadow { box-shadow: 0 20px 50px rgba(0, 123, 255, 0.1); }
        .message-box { transition: all 0.3s ease; }
    </style>
</head>
<body>
    <div id="brochure-root"></div>

    <script type="text/babel">
        const { useState, useEffect, Fragment } = React;
        
        // 아이콘 헬퍼
        const LucideIcon = ({ name, size = 24, color = "currentColor", className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{ width: size, height: size, color: color }} className={className}></i>;
        };

        const App = () => {
            const [formData, setFormData] = useState({ companyName: '', managerName: '', contactNumber: '', extraMessage: '' });
            const [checkedItems, setCheckedItems] = useState({
                '인재 채용 (구인 의뢰)': false, 
                '실무 특강 지원': false, 
                '현직자 멘토링 참여': false, 
                '프로젝트 과제 제공': false,
                '상세 상담 및 문의': false
            });
            const [message, setMessage] = useState(null);

            const brandColor = "#007BFF"; 
            const logoUrl = "https://greenart.co.kr/assets/_img/headerNew/new23_headerlogo0.svg?4";

            const toggleItem = (id) => setCheckedItems(prev => ({ ...prev, [id]: !prev[id] }));
            const handleInputChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));

            const showMsg = (text) => {
                setMessage(text);
                setTimeout(() => setMessage(null), 3000);
            };

            const handleSubmit = () => {
                const selected = Object.keys(checkedItems).filter(key => checkedItems[key]);
                if (!formData.companyName.trim() || !formData.managerName.trim() || !formData.contactNumber.trim()) {
                    showMsg("정보를 모두 입력해 주세요! 😊"); return;
                }
                if (selected.length === 0) { showMsg("항목을 선택해 주세요!"); return; }

                const baseFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfImxgHSF0uafrVjtQ62PBRAK3VVYU_uoHZPZ4ngw9YzM3yXg/viewform";
                const entries = { 
                    company: "entry.193390590", 
                    manager: "entry.2096329272", 
                    contact: "entry.794792657", 
                    menu: "entry.245785366",
                    extra: "entry.1234567890" // 실장님! 구글 폼의 '기타 문의' entry ID로 교체 필요
                };
                
                const queryString = `?usp=pp_url&${entries.company}=${encodeURIComponent(formData.companyName)}&${entries.manager}=${encodeURIComponent(formData.managerName)}&${entries.contact}=${encodeURIComponent(formData.contactNumber)}&${entries.menu}=${encodeURIComponent(selected.join(', '))}&${entries.extra}=${encodeURIComponent(formData.extraMessage)}`;
                window.open(baseFormUrl + queryString, '_blank');
            };

            return (
                <div className="flex flex-col items-center py-12 px-4 bg-slate-50 min-h-screen relative">
                    {/* 메시지 팝업 */}
                    {message && (
                        <div className="fixed top-8 z-50 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold message-box animate-bounce font-black">
                            {message}
                        </div>
                    )}

                    {/* PAGE 1: FRONT */}
                    <div className="w-full max-w-[850px] bg-white custom-shadow rounded-[2.5rem] overflow-hidden mb-16 border border-slate-100 font-black">
                        <div className="h-3 w-full" style={{ backgroundColor: brandColor }}></div>
                        <div className="p-10 md:p-14">
                            <div className="flex justify-between items-center mb-12">
                                <img src={logoUrl} alt="그린컴퓨터아카데미" className="h-10 md:h-12" />
                                <span className="text-[10px] tracking-[0.2em] text-slate-400 uppercase font-black px-3 py-1 border border-slate-100 rounded-md bg-slate-50">Professional Education</span>
                            </div>
                            
                            <h1 className="text-4xl md:text-5xl font-black text-slate-900 mb-8 leading-[1.2] tracking-tight break-keep">
                                실무에 최적화된<br />
                                <span style={{ color: brandColor }}>'단 한 명'을 길러내는 일,</span><br />
                                그린아카데미의 진심입니다.
                            </h1>
                            <div className="w-20 h-2 bg-blue-100 mb-10 rounded-full"></div>
                            
                            <p className="text-xl md:text-2xl text-slate-600 font-medium leading-relaxed mb-12 break-keep font-black">
                                그린아카데미에게 중요한 것은 수백 명의 수료생을 배출하는 것보다,<br />
                                <strong className="text-slate-900">현업에 즉시 투입 가능한 실무형 인재를 양성하는 것입니다.</strong><br />
                                <span className="text-blue-600 font-bold">이를 위해 현장의 목소리를 반영한 맞춤형 교육 과정을 지향하며, 실제로 필요한 역량을 확인해 교육 과정에 반영하고자 합니다.</span>
                            </p>

                             <div className="mt-12 p-8 rounded-3xl bg-blue-600 text-white flex flex-col items-center justify-center cursor-pointer hover:bg-blue-700 transition-all shadow-xl active:scale-95 group"
                                 onClick={() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' })}>
                                <div className="flex items-center">
                                    <span className="font-black text-2xl tracking-tight mr-4">현장에서 원하는 인재상 제안하기 (1분)</span>
                                    <LucideIcon name="arrow-right" size={28} className="group-hover:translate-x-2 transition-transform" />
                                </div>
                                <p className="mt-2 text-blue-100 text-sm font-bold opacity-90">아래 문항 체크만으로 간단히 의견을 전달할 수 있습니다.</p>
                            </div>
                        </div>
                    </div>

                    {/* PAGE 2: BACK (신청 영역 - 상담/문의 추가 및 연락처 업데이트) */}
                    <div className="w-full max-w-[850px] bg-white custom-shadow rounded-[2.5rem] overflow-hidden border-2 border-blue-500 font-black">
                        <div className="p-10 text-center bg-blue-50 border-b border-blue-100">
                            <h2 className="text-3xl font-black text-slate-900 tracking-tight uppercase">현장에서 원하는 인재상 제안하기</h2>
                            <p className="text-blue-700 mt-2 font-bold text-lg italic underline decoration-blue-200 decoration-4 underline-offset-4 break-keep">참여 가능한 항목을 체크해 주세요 (중복 가능)</p>
                        </div>

                        <div className="p-8 md:p-14 font-black">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-10 font-black">
                                {Object.keys(checkedItems).map(key => (
                                    <div key={key} onClick={() => toggleItem(key)} className={`p-4 rounded-2xl border-2 transition-all cursor-pointer flex items-center gap-4 ${checkedItems[key] ? 'border-blue-500 bg-blue-50 shadow-lg translate-y-[-2px]' : 'border-slate-50 bg-slate-50/50 hover:border-blue-200'}`}>
                                        <div className={`p-2 rounded-xl ${checkedItems[key] ? 'bg-blue-600 text-white shadow-inner' : 'bg-white border-2 border-slate-100 text-slate-200'}`}>
                                            <LucideIcon name="check" size={20} />
                                        </div>
                                        <h4 className={`font-black text-[15px] ${checkedItems[key] ? 'text-blue-600' : 'text-slate-800'}`}>{key}</h4>
                                    </div>
                                ))}
                            </div>

                            <div className="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100 mb-10 shadow-inner">
                                <div className="space-y-4">
                                    <div className="relative group">
                                        <div className="absolute left-6 top-5 text-slate-300"><LucideIcon name="building" size={22} /></div>
                                        <input type="text" name="companyName" placeholder="회사명" onChange={handleInputChange} className="w-full pl-16 pr-6 py-5 bg-white border-2 border-slate-100 rounded-2xl font-bold text-lg focus:outline-none focus:border-blue-500 transition-all shadow-sm font-black" />
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="relative group">
                                            <div className="absolute left-6 top-5 text-slate-300"><LucideIcon name="user" size={22} /></div>
                                            <input type="text" name="managerName" placeholder="담당자 성함" onChange={handleInputChange} className="w-full pl-16 pr-6 py-5 bg-white border-2 border-slate-100 rounded-2xl font-bold text-lg focus:outline-none focus:border-blue-500 transition-all shadow-sm font-black" />
                                        </div>
                                        <div className="relative group">
                                            <div className="absolute left-6 top-5 text-slate-300"><LucideIcon name="phone" size={22} /></div>
                                            <input type="text" name="contactNumber" placeholder="연락처" onChange={handleInputChange} className="w-full pl-16 pr-6 py-5 bg-white border-2 border-slate-100 rounded-2xl font-bold text-lg focus:outline-none focus:border-blue-500 transition-all shadow-sm font-black" />
                                        </div>
                                    </div>
                                    
                                    <div className="relative group">
                                        <textarea 
                                            name="extraMessage" 
                                            placeholder="기타 문의사항이나 구체적인 설명을 듣고 싶은 내용이 있다면 적어주세요." 
                                            onChange={handleInputChange}
                                            rows="3"
                                            className="w-full px-6 py-5 bg-white border-2 border-slate-100 rounded-2xl font-bold text-lg focus:outline-none focus:border-blue-500 transition-all shadow-sm font-black resize-none"
                                        ></textarea>
                                    </div>

                                    <button onClick={handleSubmit} className="w-full mt-4 py-7 bg-blue-600 hover:bg-blue-700 text-white font-black text-2xl rounded-3xl shadow-xl flex items-center justify-center gap-4 transition-all active:scale-95 group">
                                        <LucideIcon name="send" size={28} className="group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform" /> 
                                        의견 제출하고 상담 신청하기
                                    </button>
                                    <p className="mt-4 text-center text-slate-400 text-xs font-medium font-black">
                                        * 입력하신 정보는 파트너십 안내 목적으로만 안전하게 사용됩니다.
                                    </p>
                                </div>
                            </div>

                            <div className="flex flex-col md:flex-row justify-between items-center border-t border-slate-100 pt-10 font-black gap-6">
                                <div className="text-center md:text-left font-black">
                                    <p className="text-slate-900 font-black text-2xl italic tracking-tighter mb-1 underline decoration-blue-200 decoration-4 underline-offset-4">green_job@nate.com</p>
                                    {/* [수정] 요청하신 3개의 핸드폰 번호로 업데이트 */}
                                    <p className="text-slate-400 font-bold text-sm uppercase tracking-widest break-keep">
                                        취업지원실 / 010-7547-9780, 010-7548-9780, 010-7574-9780
                                    </p>
                                </div>
                                <div className="text-center md:text-right opacity-30 grayscale">
                                    <img src={logoUrl} alt="로고" className="h-6 mb-1 mx-auto md:ml-auto md:mr-0" />
                                    <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest">Green Academy</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('brochure-root'));
        root.render(<App />);
    </script>
</body>
</html>
